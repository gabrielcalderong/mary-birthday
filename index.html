<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Felicidades Mary 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(45deg, #ff6b9d, #c06c84, #6c5b7b, #355c7d);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            max-width: 900px;
        }

        .title {
            font-size: 3.5em;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                         0 0 40px rgba(255, 107, 157, 0.6);
            animation: titleAnim 3s ease-in-out infinite;
            margin-bottom: 30px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .animals {
            font-size: 8em;
            margin: 30px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .animal {
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
            transition: transform 0.3s;
        }

        .animal:hover {
            transform: scale(1.3) rotate(360deg);
            transition: transform 0.6s;
        }

        .wolf {
            animation-delay: 0s;
        }

        .sheep {
            animation-delay: 0.3s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(-10deg); }
            75% { transform: translateY(-15px) rotate(10deg); }
        }

        .message {
            font-size: 2.2em;
            color: #fff;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 1s ease-out;
            margin-top: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hacker-text {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
            font-weight: bold;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px #00ff41; }
            50% { text-shadow: 0 0 20px #00ff41, 0 0 30px #00ff41; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff6b9d;
            position: absolute;
            animation: confettiFall 5s linear infinite;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .heart {
            position: absolute;
            font-size: 2em;
            animation: heartFloat 4s ease-in-out infinite;
            opacity: 0.7;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkleAnim 2s ease-in-out infinite;
            box-shadow: 0 0 10px white;
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes titleAnim {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.04) translateY(-15px); }
        }

        .title-deco {
            font-size: 0.55em;
            letter-spacing: 10px;
            animation: heartsPulse 1.5s ease-in-out infinite;
        }

        .title-name {
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.9),
                         0 0 50px rgba(255, 107, 157, 0.8),
                         0 0 10px #fff;
        }

        @keyframes heartsPulse {
            0%, 100% { transform: scale(1) rotate(-2deg); opacity: 0.85; }
            50% { transform: scale(1.2) rotate(2deg); opacity: 1; }
        }

        @keyframes heartGrow {
            0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            40%  { transform: translate(-50%, -50%) scale(2.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
        }

        @keyframes heartExplode {
            0%   { transform: translate(-50%, -50%) scale(2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
        }

        @keyframes particleExplode {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            70% {
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1);
                opacity: 0.8;
            }
            100% {
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2em;
            }
            .animals {
                font-size: 5em;
            }
            .message {
                font-size: 1.5em;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">
            <span class="title-deco"> 🎉💜 💖 💜 💖 💜 🎉</span>
            <span>Feliz Cumpleaños</span>
            <span class="title-name">Mary</span>
            <span class="title-deco">🎉💜 💖 💜 💖 💜 🎉</span>
        </h1>
        
        <div class="animals">
            <span class="animal wolf">🐺</span>
            <span class="animal sheep">🐑</span>
        </div>
        
        <div class="message">
            Para la <span class="hacker-text">hacker</span><br>
            más hermosa, lista e increíble del mundo 💜✨
        </div>
    </div>

    <script>
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.backgroundColor = ['#ff6b9d', '#c06c84', '#6c5b7b', '#355c7d', '#ffd700', '#00ff41'][Math.floor(Math.random() * 6)];
            document.body.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 5000);
        }
        function createBurstHeart() {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const hearts = ['💜', '💖', '💗', '💓', '💝', '❤️', '💞', '🩷'];
            const emoji = hearts[Math.floor(Math.random() * hearts.length)];

            const heart = document.createElement('span');
            heart.textContent = emoji;
            heart.style.cssText = `position:fixed;left:${x}px;top:${y}px;font-size:20px;z-index:15;pointer-events:none;animation:heartGrow 0.7s ease-out forwards;display:block;`;
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.style.animation = 'heartExplode 0.35s ease-in forwards';
                const numP = 8;
                for (let i = 0; i < numP; i++) {
                    const angle = (i / numP) * Math.PI * 2 + Math.random() * 0.4;
                    const dist = 50 + Math.random() * 50;
                    const dx = Math.cos(angle) * dist;
                    const dy = Math.sin(angle) * dist;
                    const p = document.createElement('span');
                    p.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    p.style.cssText = `position:fixed;left:${x}px;top:${y}px;font-size:12px;z-index:15;pointer-events:none;--dx:${dx}px;--dy:${dy}px;animation:particleExplode 0.55s ease-out forwards;display:block;`;
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 600);
                }
                setTimeout(() => heart.remove(), 400);
            }, 700);
        }
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(sparkle);
            
            setTimeout(() => sparkle.remove(), 2000);
        }
        setInterval(createConfetti, 200);
        setInterval(createBurstHeart, 700);
        setInterval(createSparkle, 400);

        document.querySelectorAll('.animal').forEach(animal => {
            animal.addEventListener('click', function() {
                for(let i = 0; i < 20; i++) {
                    createConfetti();
                    createBurstHeart();
                }
            });
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.animal')) {
                for (let i = 0; i < 3; i++) createBurstHeart();
            }
        });
    </script>
</body>
</html>
