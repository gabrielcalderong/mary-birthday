<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Felicidades Mary 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(45deg, #ff6b9d, #c06c84, #6c5b7b, #355c7d);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            max-width: 900px;
        }

        .title {
            font-size: 4em;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                         0 0 40px rgba(255, 107, 157, 0.6);
            animation: pulse 2s ease-in-out infinite, float 3s ease-in-out infinite;
            margin-bottom: 30px;
            font-weight: bold;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .animals {
            font-size: 8em;
            margin: 30px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .animal {
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
            transition: transform 0.3s;
        }

        .animal:hover {
            transform: scale(1.3) rotate(360deg);
            transition: transform 0.6s;
        }

        .wolf {
            animation-delay: 0s;
        }

        .sheep {
            animation-delay: 0.3s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(-10deg); }
            75% { transform: translateY(-15px) rotate(10deg); }
        }

        .message {
            font-size: 2.2em;
            color: #fff;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 1s ease-out;
            margin-top: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hacker-text {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
            font-weight: bold;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px #00ff41; }
            50% { text-shadow: 0 0 20px #00ff41, 0 0 30px #00ff41; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff6b9d;
            position: absolute;
            animation: confettiFall 5s linear infinite;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .heart {
            position: absolute;
            font-size: 2em;
            animation: heartFloat 4s ease-in-out infinite;
            opacity: 0.7;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkleAnim 2s ease-in-out infinite;
            box-shadow: 0 0 10px white;
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.5em;
            }
            .animals {
                font-size: 5em;
            }
            .message {
                font-size: 1.5em;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎉 ¡Feliz Cumpleaños Mary! 🎉</h1>
        
        <div class="animals">
            <span class="animal wolf">🐺</span>
            <span class="animal sheep">🐑</span>
        </div>
        
        <div class="message">
            Para la <span class="hacker-text">hacker</span> y chica<br>
            más increíble del mundo 💜✨
        </div>
    </div>

    <script>
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.backgroundColor = ['#ff6b9d', '#c06c84', '#6c5b7b', '#355c7d', '#ffd700', '#00ff41'][Math.floor(Math.random() * 6)];
            document.body.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 5000);
        }
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 4000);
        }
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(sparkle);
            
            setTimeout(() => sparkle.remove(), 2000);
        }
        setInterval(createConfetti, 200);
        setInterval(createHeart, 800);
        setInterval(createSparkle, 400);

        document.querySelectorAll('.animal').forEach(animal => {
            animal.addEventListener('click', function() {
                for(let i = 0; i < 20; i++) {
                    createConfetti();
                }
            });
        });
    </script>
</body>
</html>
